# Shared framework config

# Web targets (LOCKED)
web.business.baseUrl=https://parabank.parasoft.com/parabank
web.tech.baseUrl=https://the-internet.herokuapp.com
web.advancedDom.baseUrl=https://selectorshub.com/xpath-practice-page/

# Web driver
webdriver.browser=chrome
webdriver.headless=true
# Selenium 4.21 is used in this training repo; pinning Chrome avoids unexpected future browser picks.
webdriver.chrome.version=125

# API target (LOCKED)
api.baseUrl=https://restful-booker.herokuapp.com

# Mobile (LOCKED targets, but execution requires local setup)
# For mobile runs, set these via -D... or edit locally:
mobile.platform=android
appium.serverUrl=http://127.0.0.1:4723/
mobile.appProfile=theapp
mobile.wait.seconds=20

android.automationName=UiAutomator2
android.deviceName=Android Emulator
android.theapp.app=apps/TheApp.apk
android.apidemos.app=apps/ApiDemos-debug.apk
android.apidemos.appPackage=io.appium.android.apis
android.apidemos.appActivity=.ApiDemos

ios.automationName=XCUITest
ios.deviceName=iPhone 15
ios.platformVersion=17.0
ios.theapp.app=apps/TheApp.app.zip
